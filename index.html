<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator App</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="wrapper">
      <section class="calculator-screen">
        <p class="screen-text" id="screen">0</p>
      </section>

      <section class="calculator-buttons">
        <button class="btn btn-light btn-wide" data-action="clear">C</button>
        <button class="btn btn-light" data-action="backspace">←</button>
        <button class="btn btn-operator" data-action="operator" data-operator="/">÷</button>

        <button class="btn btn-light" data-number="7">7</button>
        <button class="btn btn-light" data-number="8">8</button>
        <button class="btn btn-light" data-number="9">9</button>
        <button class="btn btn-operator" data-action="operator" data-operator="*">×</button>

        <button class="btn btn-light" data-number="4">4</button>
        <button class="btn btn-light" data-number="5">5</button>
        <button class="btn btn-light" data-number="6">6</button>
        <button class="btn btn-operator" data-action="operator" data-operator="-">-</button>

        <button class="btn btn-light" data-number="1">1</button>
        <button class="btn btn-light" data-number="2">2</button>
        <button class="btn btn-light" data-number="3">3</button>
        <button class="btn btn-operator" data-action="operator" data-operator="+">+</button>

        <button class="btn btn-light btn-wide" data-number="0">0</button>
        <button class="btn btn-operator" data-action="equals">=</button>
      </section>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
